services:
  - type: web
    name: artheenoi-dashboard
    runtime: python
    buildCommand: pip install -r requirements_dashboard.txt
    startCommand: python dashboard_server.py
    envVars:
      - key: FLASK_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: artheenoi2026
      - key: REFRESH_MINUTES
        value: "15"
      - key: MARKETAUX_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
